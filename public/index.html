<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopee Scraper — Cari Harga Terendah</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #EE4D2D;
      --orange-light: #FF7043;
      --orange-glow: rgba(238,77,45,0.18);
      --bg: #0D0D0D;
      --surface: #161616;
      --surface2: #1F1F1F;
      --border: rgba(255,255,255,0.07);
      --text: #F0EDE8;
      --muted: #888;
      --green: #22C55E;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* BG radial gradient */
    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(238,77,45,0.08) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      padding: 48px 0 0;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange-glow);
      border: 1px solid rgba(238,77,45,0.3);
      color: var(--orange-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--orange);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    h1 span {
      -webkit-text-fill-color: transparent;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 60%, #FFB74D 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }

    /* FORM CARD */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 12px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    input:focus {
      border-color: rgba(238,77,45,0.5);
      box-shadow: 0 0 0 3px rgba(238,77,45,0.1);
    }

    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    .hint a {
      color: var(--orange-light);
      text-decoration: none;
    }

    .btn-search {
      width: 100%;
      background: linear-gradient(135deg, var(--orange) 0%, #D84315 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(238,77,45,0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-search::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.4s;
    }

    .btn-search:hover::after { left: 150%; }

    .btn-search:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(238,77,45,0.45);
    }

    .btn-search:active { transform: translateY(0); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* STATUS */
    #status-area {
      margin: 24px 0;
      min-height: 0;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(238,77,45,0.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { font-size: 14px; color: var(--muted); }
    .status-text strong { color: var(--text); font-weight: 500; }

    .error-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      color: #F87171;
      font-size: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* RESULTS */
    #results-area { margin-top: 8px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .keyword-tag {
      background: var(--orange-glow);
      border: 1px solid rgba(238,77,45,0.25);
      color: var(--orange-light);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
    }

    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.12s; }
    .product-card:nth-child(3) { animation-delay: 0.19s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover {
      border-color: rgba(238,77,45,0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .rank-badge {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }

    .rank-1 { background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; box-shadow: 0 4px 16px rgba(245,158,11,0.4); }
    .rank-2 { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .rank-3 { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    .product-info { min-width: 0; }

    .product-name {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--orange);
    }

    .product-link-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 16px;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .product-link-btn:hover {
      background: var(--orange-glow);
      border-color: rgba(238,77,45,0.3);
      color: var(--orange-light);
    }

    @media (max-width: 520px) {
      .product-card { grid-template-columns: auto 1fr; }
      .product-link-btn { grid-column: 2; justify-self: start; }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 48px 0 32px;
      color: rgba(255,255,255,0.15);
      font-size: 12px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      Shopee Indonesia
    </div>
    <h1>Temukan Harga<br/><span>Terbaik di Shopee</span></h1>
    <p class="subtitle">Masukkan keyword produk dan dapatkan 3 harga terendah dari Shopee secara otomatis.</p>
  </header>

  <div class="form-card">
    <div class="form-grid">
      <div class="field-group">
        <label for="keyword">Keyword Produk</label>
        <input type="text" id="keyword" placeholder="Contoh: Compressor, Laptop, dll." autocomplete="off"/>
      </div>
      <div class="field-group">
        <label for="apikey">Apify API Key</label>
        <input type="password" id="apikey" placeholder="apify_api_XXXXXXXXXXXX"/>
        <span class="hint">Dapatkan API Key gratis di <a href="https://apify.com" target="_blank">apify.com</a></span>
      </div>
    </div>
    <button class="btn-search" id="btn-search" onclick="startScrape()">
      🔍 Cari Produk Termurah
    </button>
  </div>

  <div id="status-area" class="hidden"></div>
  <div id="results-area" class="hidden"></div>

</div>

<footer>© 2026 Shopee Scraper — Powered by Apify</footer>

<script>
  async function startScrape() {
    const keyword = document.getElementById('keyword').value.trim();
    const apiKey  = document.getElementById('apikey').value.trim();
    const btn     = document.getElementById('btn-search');
    const statusEl  = document.getElementById('status-area');
    const resultsEl = document.getElementById('results-area');

    if (!keyword) { showError('Masukkan keyword produk terlebih dahulu.'); return; }
    if (!apiKey)  { showError('Masukkan Apify API Key terlebih dahulu.'); return; }

    btn.disabled = true;
    btn.textContent = 'Sedang mencari...';
    resultsEl.classList.add('hidden');
    statusEl.classList.remove('hidden');
    statusEl.innerHTML = `
      <div class="status-card">
        <div class="spinner"></div>
        <div class="status-text">
          <strong>Mencari produk "${keyword}"</strong><br/>
          Mengambil data dari Shopee via Apify — harap tunggu...
        </div>
      </div>`;

    try {
      const resp = await fetch('/api/scrape', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, apiKey })
      });

      const data = await resp.json();
      if (!resp.ok || !data.success) throw new Error(data.error || 'Terjadi kesalahan.');

      statusEl.classList.add('hidden');
      showResults(data.keyword, data.products);
    } catch (err) {
      showError(err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '🔍 Cari Produk Termurah';
    }
  }

  function showError(msg) {
    const statusEl = document.getElementById('status-area');
    statusEl.classList.remove('hidden');
    statusEl.innerHTML = `
      <div class="error-card">
        <span>⚠️</span>
        <span>${msg}</span>
      </div>`;
  }

  function showResults(keyword, products) {
    const el = document.getElementById('results-area');
    el.classList.remove('hidden');
    el.innerHTML = `
      <div class="results-header">
        <span class="results-title">Hasil Pencarian</span>
        <span class="keyword-tag">${keyword}</span>
      </div>
      ${products.map((p, i) => `
        <div class="product-card">
          <div class="rank-badge rank-${i+1}">${i+1}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.priceFormatted}</div>
          </div>
          <a class="product-link-btn" href="${p.link}" target="_blank" rel="noopener">Lihat →</a>
        </div>
      `).join('')}`;
  }

  document.getElementById('keyword').addEventListener('keydown', e => {
    if (e.key === 'Enter') startScrape();
  });
</script>
</body>
</html>
